name: pr

on:
  pull_request:

permissions:
  contents: read
  id-token: write
  pull-requests: write

defaults:
  run:
    shell: bash

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:

  lint-and-docs:
    uses: slingshot-pipelines/workflows/.github/workflows/check-github-action.yml@check-github-action/v0
    with:
      COMPONENT: action
    secrets: inherit

  pr-ready:
    needs:
      - lint-and-docs
    runs-on: ubuntu-latest
    if: ${{ always() }}
    steps:
      -
        uses: slingshot-pipelines/action-pr-ready@v0
        with:
          NEEDS: ${{ toJSON(needs) }}
