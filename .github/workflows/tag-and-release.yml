name: tag-and-release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  id-token: write

defaults:
  run:
    shell: bash

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:

  tag-and-release:
    uses: slingshot-pipelines/workflows/.github/workflows/tag-and-release.yml@tag-and-release/v0
    with:
      JOB_NAME: tag-and-release
      TAG_PREFIX: v
      FLOATING_TAGS: true
    secrets:
      APP_CLIENT_ID: ${{ secrets.WRITER_APP_CLIENT_ID }}
      APP_PRIVATE_KEY: ${{ secrets.WRITER_APP_PRIVATE_KEY }}
